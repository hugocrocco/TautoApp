import { defineConfig } from 'vite'
import react from '@vitejs/plugin-react'

// NOTE:
// This config intentionally does NOT import/parse package.json.
// Importing JSON here can cause intermittent "Unexpected end of file in JSON"
// during Vite restarts on some file systems/sync setups.

export default defineConfig({
  plugins: [react()],
  server: {
    host: true,
    port: 5173,
    strictPort: true,

    // If your backend is Spring Boot on 8080 and your API starts with /api
    proxy: {
      '/api': {
        target: 'http://localhost:8080',
        changeOrigin: true,
      },
    },

    // Avoid triggering restarts because of lockfile/package.json change events
    watch: {
      ignored: [
        '**/package.json',
        '**/package-lock.json',
        '**/pnpm-lock.yaml',
        '**/yarn.lock',
      ],
    },
  },
})